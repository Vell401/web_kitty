server {
  # Nginx будет слушать 80-й порт внутри контейнера
  listen 80;

  # Проксирование запросов к API бэкенда
  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
  }

  # Проксирование запросов к админке Django
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/admin/;
  }

  # Раздача пользовательского контента (картинки котиков)
  location /media/ {
    alias /media/;
  }

  # Раздача статики фронтенда и админки
  location / {
    alias /staticfiles/;
    index  index.html index.htm;
    try_files $uri /index.html;
  }
}